Parameters:
  RemappingTemplate: |
    remappings:
      - type: mount
        from:
          accessor: raw_ntfs
          prefix: |
            {
               "DelegateAccessor": "file",
               "DelegatePath": %q,
               "Path": "/"
            }
        on:
          accessor: "ntfs"
          prefix: 'C:'
          path_type: ntfs


      - type: mount
        from:
          accessor: mft
          prefix: |
            {
               "DelegateAccessor": "file",
               "DelegatePath": %q,
               "Path": "/"
            }
        on:
          accessor: mft
          prefix: '\\\\.\\C:'
          path_type: ntfs

      - type: shadow
        from:
          accessor: auto
        on:
          accessor: auto


Queries:
  - LET _ <= remap(config=format(format=RemappingTemplate,
       args=[
          srcDir+'/artifacts/testdata/files/test.ntfs.dd',
          srcDir+'/artifacts/testdata/files/test.ntfs.dd'
        ]), clear=TRUE)
  - LET _2 <= SELECT mock(function='magic', results=['Mocked magic'])
  # Test MFT output
  - SELECT * FROM Artifact.Windows.NTFS.Timestomp(PathRegex='txt$')


